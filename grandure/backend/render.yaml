services:
  - type: web
    name: grandure-api
    runtime: python
    rootDir: grandure/backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AZURE_AI_ENDPOINT
        sync: false
      - key: AZURE_AI_API_KEY
        sync: false
      - key: AZURE_MODEL_NAME
        value: gpt-4o
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_SMTP_HOST
        value: smtp.gmail.com
      - key: EMAIL_SMTP_PORT
        value: "587"
      - key: MCP_SERVER_URL
        value: http://localhost:8001
